<!DOCTYPE html>
<html>
<head>
    <title>Task 2 Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Student Productivity Dashboard</h1>
</header>

<div class="container">

    <section class="contact">

        <h2>Contact Form</h2>

        <form id="contactForm">

            <input type="text"
                   id="name"
                   placeholder="Enter Name">

            <input type="email"
                   id="email"
                   placeholder="Enter Email">

            <button type="submit">
                Submit
            </button>

        </form>

        <p id="message"></p>

    </section>

    <section class="todo">

        <h2>To-Do List</h2>

        <input type="text"
               id="taskInput"
               placeholder="Add Task">

        <button onclick="addTask()">
            Add
        </button>

        <ul id="taskList"></ul>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
